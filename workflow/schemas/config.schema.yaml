$schema: "http://json-schema.org/draft-07/schema#"

type: object

properties:
  accessions:
    type: string
    description: >
      Path to a TSV file (columns: sample, assembly) listing public genomes
      to download from NCBI. The key may be omitted or commented out entirely
      to run with local genomes only.

  ani_method:
    type: string
    enum:
      - none
      - fastani
      - pyani
      - skani
    default: skani

  genes:
    type: array
    minItems: 1
    items:
      type: string

  ref_genes:
    type: string
    description: Path to the reference gene FASTA file.

  tree:
    type: object

    properties:
      method:
        type: string
        enum:
          - raxml
          - iqtree
          - fasttree
        default: iqtree

      bootstrap:
        type: integer
        minimum: 1
        default: 1000

    required:
      - method

    allOf:
      # RAxML
      - if:
          properties:
            method:
              const: raxml
        then:
          required:
            - bootstrap
          properties:
            bootstrap:
              type: integer
              minimum: 1

      # IQ-TREE
      - if:
          properties:
            method:
              const: iqtree
        then:
          required:
            - bootstrap
          properties:
            bootstrap:
              type: integer
              minimum: 100

      # FastTree
      - if:
          properties:
            method:
              const: fasttree
        then:
          not:
            required:
              - bootstrap

required:
  - genes
  - ref_genes
  - tree
