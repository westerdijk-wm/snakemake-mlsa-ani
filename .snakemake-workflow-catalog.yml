usage:
  mandatory-flags:
    desc: >
      Place genome assemblies in the genomes/ directory before running.
      Adjust config/config.yaml to set the MLSA
      loci, tree method, and ANI settings.
    flags: '--cores <N> --use-conda'
  software-stack-deployment:
    conda: true
    apptainer: false
    apptainer+conda: false
    report: true